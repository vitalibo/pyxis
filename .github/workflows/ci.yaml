name: 'Continuous Integration (CI)'

on:
  push:
    branches: [ '**' ]
    tags: [ '*' ]
  workflow_dispatch:

jobs:
  code-quality:
    name: Check code quality

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ '3.8', '3.9', '3.10' ]

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v6

      - name: 'Set up Just'
        uses: extractions/setup-just@v3

      - name: 'Install uv'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: 'Set up Python'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 'Install dependencies'
        run: |
          just sync

      - name: 'Run code style checks'
        run: |
          just format
          just check

      - name: 'Run tests with coverage'
        run: |
          just coverage


  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest

    needs:
      - code-quality

    if: github.ref_type == 'tag'

    permissions:
      id-token: write

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v6

      - name: 'Set up Just'
        uses: extractions/setup-just@v3

      - name: 'Install uv'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: 'Set up Python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      - name: 'Build package'
        run: |
          just build

      - name: 'Publish to PyPI'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
